[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log

[program:backend]
command=/app/backend/thefox-backend
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile=/var/log/supervisor/backend.out.log
environment=PORT=3001,DATABASE_URL="sqlite:///app/data/thefox.db"

[program:web]
command=npm start
directory=/app/web
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/web.err.log
stdout_logfile=/var/log/supervisor/web.out.log
environment=PORT=3000,NODE_ENV=production

[program:mobile]
command=npx expo start --web --port 8080
directory=/app/mobile
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/mobile.err.log
stdout_logfile=/var/log/supervisor/mobile.out.log
environment=PORT=8080,NODE_ENV=production
