name: Deploy to Google Cloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'thefox-474800' }}
  REGION: asia-southeast1
  SERVICE_NAME: thefox

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd apps/web
        npm ci
        cd ../mobile
        npm ci
    
    - name: Run tests
      run: |
        cd apps/web
        npm run test
        cd ../mobile
        npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
    
    - name: Configure Docker
      run: gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        docker build -t gcr.io/$PROJECT_ID/thefox:$GITHUB_SHA .
        docker tag gcr.io/$PROJECT_ID/thefox:$GITHUB_SHA gcr.io/$PROJECT_ID/thefox:latest
    
    - name: Push to Container Registry
      run: |
        docker push gcr.io/$PROJECT_ID/thefox:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/thefox:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/thefox:$GITHUB_SHA \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 80 \
          --memory 2Gi \
          --cpu 2 \
          --max-instances 10 \
          --min-instances 1 \
          --concurrency 100 \
          --timeout 300s \
          --set-env-vars NODE_ENV=production,PORT=80
    
    - name: Get service URL
      run: |
        SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --region=$REGION --format="value(status.url)")
        echo "Service URL: $SERVICE_URL"
        echo "::set-output name=service_url::$SERVICE_URL"
