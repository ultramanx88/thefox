# Auto-deploy to staging on main branch
name: Auto Deploy to Staging
on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  deploy_staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run CI pipeline
        run: npm run ci
        
      - name: Deploy to Firebase Staging
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEFOX_SP7ZZ }}
          channelId: staging
          projectId: thefox-sp7zz
          
      - name: Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            
            await github.rest.repos.createCommitComment({
              owner,
              repo,
              commit_sha: sha,
              body: `🚀 **Staging Deployment Complete**\n\n✅ Successfully deployed to staging environment\n\n📍 **Staging URL**: Check Firebase Console for staging channel URL\n\n🔗 **Commit**: ${sha.substring(0, 7)}`
            });
