# Deploy to Firebase on Git Tag
name: Deploy on Tag Release
on:
  push:
    tags:
      - 'v*.*.*'        # Version tags (v1.0.0, v2.1.3, etc.)
      - 'release-*'     # Release tags (release-staging, release-prod)

jobs:
  determine_environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deploy_functions: ${{ steps.env.outputs.deploy_functions }}
    steps:
      - name: Determine deployment environment
        id: env
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Tag: $TAG_NAME"
          
          if [[ $TAG_NAME == release-prod* ]] || [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy_functions=true" >> $GITHUB_OUTPUT
            echo "🚀 Production deployment triggered by tag: $TAG_NAME"
          elif [[ $TAG_NAME == release-staging* ]] || [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.*$ ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy_functions=false" >> $GITHUB_OUTPUT
            echo "🧪 Staging deployment triggered by tag: $TAG_NAME"
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy_functions=false" >> $GITHUB_OUTPUT
            echo "⚠️ Unknown tag format, defaulting to staging: $TAG_NAME"
          fi

  deploy:
    needs: determine_environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine_environment.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run CI checks and build
        run: npm run ci
        
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEFOX_SP7ZZ }}
          channelId: ${{ needs.determine_environment.outputs.environment == 'production' && 'live' || 'staging' }}
          projectId: thefox-sp7zz
          
      - name: Deploy Functions (Production only)
        if: ${{ needs.determine_environment.outputs.deploy_functions == 'true' }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          
      - name: Create GitHub Release
        if: ${{ needs.determine_environment.outputs.environment == 'production' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            🚀 Production deployment completed successfully!
            
            **Deployed Components:**
            - ✅ Firebase Hosting
            - ✅ Firebase Functions
            - ✅ Firestore Rules & Indexes
            
            **URLs:**
            - Production: https://thefox-sp7zz.web.app
            
            **Git Information:**
            - Tag: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false