# Monitoring configuration for theFOX application
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: thefox-monitor
  labels:
    app: thefox
spec:
  selector:
    matchLabels:
      app: thefox
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thefox-alerts
data:
  alerts.yaml: |
    groups:
    - name: thefox.rules
      rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"
      
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds"
      
      - alert: ServiceDown
        expr: up{job="thefox"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "theFOX service is down"
          description: "theFOX service has been down for more than 1 minute"
      
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{name="thefox"} / container_spec_memory_limit_bytes{name="thefox"}) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% of limit"
      
      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total{name="thefox"}[5m]) / container_spec_cpu_quota{name="thefox"} * container_spec_cpu_period{name="thefox"}) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% of limit"
