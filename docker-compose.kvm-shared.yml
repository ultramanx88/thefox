services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${THEFOX_POSTGRES_DB:-thefox}
      POSTGRES_USER: ${THEFOX_POSTGRES_USER:-thefox}
      POSTGRES_PASSWORD: ${THEFOX_POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${THEFOX_POSTGRES_USER:-thefox} -d ${THEFOX_POSTGRES_DB:-thefox}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://127.0.0.1:3100}
      DATABASE_URL: postgresql://${THEFOX_POSTGRES_USER:-thefox}:${THEFOX_POSTGRES_PASSWORD:-change-me}@postgres:5432/${THEFOX_POSTGRES_DB:-thefox}?schema=public
      REDIS_URL: redis://redis:6379
      THEFOX_SUPERADMIN_EMAIL: ${THEFOX_SUPERADMIN_EMAIL:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_REDIRECT_URI: ${LINE_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      WEB_AUTH_SUCCESS_URL: ${WEB_AUTH_SUCCESS_URL:-}
      WEB_AUTH_FAILURE_URL: ${WEB_AUTH_FAILURE_URL:-}
    ports:
      - "${THEFOX_API_BIND:-127.0.0.1}:${THEFOX_API_PORT:-4100}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:4100}
    ports:
      - "${THEFOX_WEB_BIND:-127.0.0.1}:${THEFOX_WEB_PORT:-3100}:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
