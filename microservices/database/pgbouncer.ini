[databases]
user_db = host=postgres-user-master port=5432 dbname=user_db
product_db = host=postgres-product-shard1 port=5432 dbname=product_db_shard1

[pgbouncer]
listen_port = 5432
listen_addr = *
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool settings
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5

# Connection limits
server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 0

# Logging
admin_users = postgres
stats_users = postgres
log_connections = 1
log_disconnections = 1