events {
    worker_connections 1024;
}

http {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Hide server version
    server_tokens off;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    upstream database-service {
        server database-service:3012;
    }
    
    upstream monitoring-service {
        server monitoring-service:3011;
    }
    
    upstream event-streaming-service {
        server event-streaming-service:3010;
    }
    
    upstream security-service {
        server security-service:3009;
    }
    upstream user-service {
        server user-service:3001;
    }
    
    upstream product-service {
        server product-service:3002;
    }
    
    upstream order-service {
        server order-service:3003;
    }
    
    upstream payment-service {
        server payment-service:3004;
    }
    
    upstream notification-service {
        server notification-service:3005;
    }
    
    upstream cache-service {
        server cache-service:3008;
    }
    
    upstream search-service {
        server search-service:3007;
    }
    
    upstream analytics-service {
        server analytics-service:3006;
    }

    server {
        listen 80;
        
        # Security configurations
        client_max_body_size 10M;
        client_body_timeout 60s;
        client_header_timeout 60s;
        
        # Connection limits
        limit_conn conn_limit_per_ip 20;
        
        # Database Service
        location /api/database/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://database-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Monitoring Service
        location /api/monitoring/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://monitoring-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Event Streaming Service
        location /api/events/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://event-streaming-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /api/saga/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://event-streaming-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Security Service
        location /api/security/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://security-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # User Service (Auth endpoints with stricter limits)
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://user-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://user-service/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Other services with rate limiting
        location /api/products/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://product-service/;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/orders/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://order-service/;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Payment Service
        location /api/payments/ {
            proxy_pass http://payment-service/;
        }
        
        # Notification Service
        location /api/notifications/ {
            proxy_pass http://notification-service/;
        }
        
        # Cache Service
        location /api/cache/ {
            proxy_pass http://cache-service/;
        }
        
        # Search Service
        location /api/search/ {
            proxy_pass http://search-service/;
        }
        
        # Analytics Service
        location /api/analytics/ {
            proxy_pass http://analytics-service/;
        }
        
        # Health Check
        location /health {
            return 200 "OK";
        }
    }
}