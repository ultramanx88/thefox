input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json_lines
  }
  
  http {
    port => 8080
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }
  
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }
  
  # Parse service logs
  if [service] {
    mutate {
      add_tag => [ "service_log" ]
    }
  }
  
  # Parse error logs
  if [level] == "error" or [severity] == "error" {
    mutate {
      add_tag => [ "error_log" ]
    }
  }
  
  # Parse HTTP access logs
  if [method] and [url] and [statusCode] {
    mutate {
      add_tag => [ "http_access_log" ]
    }
  }
  
  # Geoip for IP addresses
  if [ip] {
    geoip {
      source => "ip"
      target => "geoip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch-logs:9200"]
    index => "thefox-logs-%{+YYYY.MM.dd}"
  }
  
  # Debug output
  stdout {
    codec => rubydebug
  }
}