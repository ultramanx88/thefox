version: '3.8'

services:
  redis-1:
    image: redis:7-alpine
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7001:6379"
    volumes:
      - redis1_data:/data
    networks:
      - redis-cluster

  redis-2:
    image: redis:7-alpine
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7002:6379"
    volumes:
      - redis2_data:/data
    networks:
      - redis-cluster

  redis-3:
    image: redis:7-alpine
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7003:6379"
    volumes:
      - redis3_data:/data
    networks:
      - redis-cluster

  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    command: >
      sh -c "
        sleep 10 &&
        redis-cli --cluster create 
        redis-1:6379 redis-2:6379 redis-3:6379 
        --cluster-replicas 0 --cluster-yes
      "
    networks:
      - redis-cluster

networks:
  redis-cluster:
    driver: bridge

volumes:
  redis1_data:
  redis2_data:
  redis3_data: