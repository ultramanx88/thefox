version: '3.8'

services:
  # Master Databases
  postgres-user-master:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
    ports:
      - "5432:5432"
    volumes:
      - user_master_data:/var/lib/postgresql/data
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./database/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # Read Replicas
  postgres-user-replica:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGUSER: postgres
      POSTGRES_MASTER_SERVICE: postgres-user-master
    ports:
      - "5433:5432"
    volumes:
      - user_replica_data:/var/lib/postgresql/data
      - ./database/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
    depends_on:
      - postgres-user-master

  # PgBouncer Connection Pooler
  pgbouncer-user:
    image: pgbouncer/pgbouncer:latest
    environment:
      DATABASES_HOST: postgres-user-master
      DATABASES_PORT: 5432
      DATABASES_USER: postgres
      DATABASES_PASSWORD: password
      DATABASES_DBNAME: user_db
      POOL_MODE: transaction
      SERVER_RESET_QUERY: DISCARD ALL
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
    ports:
      - "6432:5432"
    volumes:
      - ./database/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
    depends_on:
      - postgres-user-master

  # Product Database with Sharding
  postgres-product-shard1:
    image: postgres:15
    environment:
      POSTGRES_DB: product_db_shard1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - product_shard1_data:/var/lib/postgresql/data
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  postgres-product-shard2:
    image: postgres:15
    environment:
      POSTGRES_DB: product_db_shard2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - product_shard2_data:/var/lib/postgresql/data
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # Redis for Query Caching
  redis-query-cache:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_query_cache:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  user_master_data:
  user_replica_data:
  product_shard1_data:
  product_shard2_data:
  redis_query_cache: